name: Sync All Releases
on:
  workflow_dispatch:  # 手动触发

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Sync All Releases
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # 获取源仓库的所有 releases
          SOURCE_REPO="P1ne4pp1e/PIP-Link"
          TARGET_REPO="PIP-AlgorithmGroup/PIP-Link"
          
          echo "Getting all releases from $SOURCE_REPO..."
          RELEASES=$(gh release list --repo "$SOURCE_REPO" --limit 100 --json tagName,name,isPrerelease,isDraft)
          
          echo "$RELEASES" | jq -c '.[]' | while read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tagName')
            RELEASE_NAME=$(echo "$release" | jq -r '.name')
            IS_PRERELEASE=$(echo "$release" | jq -r '.isPrerelease')
            IS_DRAFT=$(echo "$release" | jq -r '.isDraft')
            
            echo "Processing release: $TAG_NAME"
            
            # 获取 release body
            RELEASE_BODY=$(gh release view "$TAG_NAME" --repo "$SOURCE_REPO" --json body --jq '.body')
            
            # 构建选项
            OPTS=""
            [ "$IS_PRERELEASE" = "true" ] && OPTS="$OPTS --prerelease"
            [ "$IS_DRAFT" = "true" ] && OPTS="$OPTS --draft"
            
            # 创建或更新 release
            gh release create "$TAG_NAME" \
              --repo "$TARGET_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY" \
              $OPTS 2>/dev/null || \
            gh release edit "$TAG_NAME" \
              --repo "$TARGET_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY"
            
            # 同步 assets
            echo "Downloading assets for $TAG_NAME..."
            gh release download "$TAG_NAME" --repo "$SOURCE_REPO" -D "/tmp/assets-$TAG_NAME" 2>/dev/null || true
            
            if ls /tmp/assets-$TAG_NAME/* 1> /dev/null 2>&1; then
              echo "Uploading assets for $TAG_NAME..."
              gh release upload "$TAG_NAME" /tmp/assets-$TAG_NAME/* \
                --repo "$TARGET_REPO" \
                --clobber
              rm -rf "/tmp/assets-$TAG_NAME"
            fi
            
            echo "✓ Synced release: $TAG_NAME"
          done
          
          echo "All releases synced successfully!"