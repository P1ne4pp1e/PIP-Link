name: Sync to Organization Repo
on:
  push:
    branches: ['**']
    tags: ['**']
  release:
    types: [published, edited]
  workflow_dispatch:  # 添加手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync code and tags
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 临时删除 sync workflow
          if [ -f .github/workflows/auto-sync.yml ]; then
            git rm .github/workflows/auto-sync.yml
            git commit -m "Temporarily remove sync workflow"
          fi
          
          # 临时删除 sync workflow
          if [ -f .github/workflows/sync-release.yml ]; then
            git rm .github/workflows/sync-release.yml
            git commit -m "Temporarily remove sync release workflow"
          fi
          
          git remote add backup https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/PIP-AlgorithmGroup/PIP-Link.git
          git push backup --all --force
          git push backup --tags --force
          
          # 恢复文件（仅在本地，不推送）
          git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

      - name: Sync Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_BODY="${{ github.event.release.body }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          IS_DRAFT="${{ github.event.release.draft }}"
          
          OPTS=""
          [ "$IS_PRERELEASE" = "true" ] && OPTS="$OPTS --prerelease"
          [ "$IS_DRAFT" = "true" ] && OPTS="$OPTS --draft"
          
          gh release create "$TAG_NAME" \
            --repo "PIP-AlgorithmGroup/PIP-Link" \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_BODY" \
            $OPTS 2>/dev/null || \
          gh release edit "$TAG_NAME" \
            --repo "PIP-AlgorithmGroup/PIP-Link" \
            --title "$RELEASE_NAME" \
            --notes "$RELEASE_BODY"

      - name: Sync Release Assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          
          gh release download "$TAG_NAME" --repo "P1ne4pp1e/PIP-Link" -D /tmp/assets || true
          
          if ls /tmp/assets/* 1> /dev/null 2>&1; then
            gh release upload "$TAG_NAME" /tmp/assets/* \
              --repo "PIP-AlgorithmGroup/PIP-Link" \
              --clobber
          fi